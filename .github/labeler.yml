# Configuration for automatic PR labeling based on file paths

backend:
  - changed-files:
      - any-glob-to-any-file:
          - '*.py'
          - 'settings.py'
          - 'urls.py'
          - 'wsgi.py'
          - 'manage.py'
          - 'shop/**/*.py'
          - 'requirements.txt'

frontend:
  - changed-files:
      - any-glob-to-any-file:
          - 'app/**/*'
          - 'components/**/*'
          - 'lib/**/*'
          - 'public/**/*'
          - '*.tsx'
          - '*.ts'
          - '*.jsx'
          - '*.js'
          - 'package.json'
          - 'next.config.js'
          - 'tailwind.config.ts'

database:
  - changed-files:
      - any-glob-to-any-file:
          - 'settings.py'
          - '**/migrations/**'
          - 'scripts/check_db_connection.py'

scripts:
  - changed-files:
      - any-glob-to-any-file:
          - 'scripts/**/*'

ci:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/**/*'
          - 'scripts/ci_local.sh'
          - '.gitlab-ci.yml'

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - 'docs/**/*'
          - '*.md'
          - 'README.md'

configuration:
  - changed-files:
      - any-glob-to-any-file:
          - '.env.example'
          - '.env.production.template'
          - 'docker-compose*.yml'
          - '.gitignore'
